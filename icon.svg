<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0d9488"/>
  <defs>
    <clipPath id="tube">
      <path d="M 190 110 L 190 360 A 66 66 0 0 0 322 360 L 322 110 Z"/>
    </clipPath>
  </defs>
  <!-- 試験管の中身（白い液体） -->
  <rect x="180" y="230" width="160" height="200" fill="#ffffff" clip-path="url(#tube)"/>
  <!-- バーコード（液体の中にティール色で抜き） -->
  <g fill="#0d9488" clip-path="url(#tube)">
    <rect x="202" y="250" width="12" height="180"/>
    <rect x="222" y="250" width="6" height="180"/>
    <rect x="236" y="250" width="16" height="180"/>
    <rect x="260" y="250" width="8" height="180"/>
    <rect x="276" y="250" width="14" height="180"/>
    <rect x="298" y="250" width="6" height="180"/>
    <rect x="312" y="250" width="10" height="180"/>
  </g>
  <!-- 試験管の外形（白線） -->
  <path d="M 190 110 L 190 360 A 66 66 0 0 0 322 360 L 322 110"
        fill="none" stroke="#ffffff" stroke-width="18" stroke-linejoin="round"/>
  <!-- 試験管の口（リム） -->
  <rect x="168" y="84" width="176" height="38" rx="10" fill="#ffffff"/>
</svg>
